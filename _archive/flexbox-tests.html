<!doctype html>
<html lang="de_CH">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Tests – Archiv</title>
    <style>
      body {
        margin: 2rem;
        background-color: #1f1f1f;
        color: white;
        font-family: Arial, sans-serif;
      }
      .parent {
        display: flex;
        width: 400px;
        height: 400px;
        background-color: #ffea00;
        flex-direction: column;
      }
      .child1 { width: 100px; height: 100px; background-color: #ff0000; }
      .child2 { width: 100px; height: 100px; background-color: #00ff00; }
      .child3 { width: 100px; height: 100px; background-color: #0000ff; }
    </style>
  </head>
  <body>
    <h2>Flexbox Tests</h2>
    <div class="parent">
      <div class="child1">Child 1</div>
      <div class="child2">Child 2</div>
      <div class="child3">Child 3</div>
    </div>
  </body>
</html>
